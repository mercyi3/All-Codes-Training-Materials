<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Form</title>
</head>
<body>

<h1>Feedback Form</h1>

<form action="layout.html" target="_self">

    <label>Name</label>
    <input type="text" name="name" placeholder="Enter Your Name" required><br><br>

    <label>Email</label>
    <input type="email" name="email" placeholder="Enter Email" required><br><br>

    <label>Gender</label><br><br>
    <input type="radio" name="gender" value="male">Male<br>
    <input type="radio" name="gender" value="female">Female<br>
    <input type="radio" name="gender" value="other">Other<br><br>

    <label>Course</label><br><br>
    <select name="course">
        <option>MERN Stack</option>
        <option>MEAN Stack</option>
        <option>Java Fullstack</option>
    </select><br><br>

    <label>Phone Number</label>
    <input type="number" name="phoneNo" placeholder="Enter Phone Number" required><br><br>

    <label>Timing :</label><br>
    <input type="checkbox" name="timing" value="morning"> Morning Class <br>
    <input type="checkbox" name="timing" value="evening"> Evening Class<br><br>

    <label>Feedback</label>
    <textarea name="feedback"></textarea><br><br>

    <input type="submit" value="Submit Form">
    <br><br>

    <input type="file">

</form>

</body>
</html>
