<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

  <title>Enquiry Form</title>
  
  <!-- <script type="text/javascript">
        document.addEventListener('contextmenu', function(event) {
            event.preventDefault(); // Disable right-click
        });
    </script> -->

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    .watermark {
      position: absolute;
      top: 100%;
      left: 50%;
      width: 40%;
      transform: translate(-50%, -50%);
      opacity: 0.1;
      pointer-events: none;
      z-index: 0;
    }
    body {
      font-family: 'Inter', sans-serif;
      background-image: url(./ClassRoom.jpg);
      background-repeat: no-repeat;
      background-size: cover;
      /* opacity: 0.9; */
    }
    .formbold-main-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px;
    }
  
    .formbold-form-wrapper {
      margin: 0 auto;
      max-width: 570px;
      width: 100%;
      background: white;
      padding: 40px;
      
    }
  
    .formbold-form-img {
      margin-bottom: 45px;
    }
  
    .formbold-input-group {
      margin-bottom: 18px;
    }
  
    .formbold-form-select {
      width: 100%;
      padding: 12px 22px;
      border-radius: 5px;
      border: 1px solid #dde3ec;
      background: #ffffff;
      font-size: 16px;
      color: #536387;
      outline: none;
      resize: none;
    }
  
    .formbold-input-radio-wrapper {
      margin-bottom: 25px;
    }
    .formbold-radio-flex {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .formbold-radio-label {
      font-size: 14px;
      line-height: 24px;
      color: #07074d;
      position: relative;
      padding-left: 25px;
      cursor: pointer;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }
    .formbold-input-radio {
      position: absolute;
      opacity: 0;
      cursor: pointer;
    }
    .formbold-radio-checkmark {
      position: absolute;
      top: -1px;
      left: 0;
      height: 18px;
      width: 18px;
      background-color: #ffffff;
      border: 1px solid #dde3ec;
      border-radius: 50%;
    }
    .formbold-radio-label
      .formbold-input-radio:checked
      ~ .formbold-radio-checkmark {
      background-color: #6a64f1;
    }
    .formbold-radio-checkmark:after {
      content: '';
      position: absolute;
      display: none;
    }
  
    .formbold-radio-label
      .formbold-input-radio:checked
      ~ .formbold-radio-checkmark:after {
      display: block;
    }
  
    .formbold-radio-label .formbold-radio-checkmark:after {
      top: 50%;
      left: 50%;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ffffff;
      transform: translate(-50%, -50%);
    }
  
    .formbold-form-input {
      width: 100%;
      padding: 13px 22px;
      border-radius: 5px;
      border: 1px solid #dde3ec;
      background: #ffffff;
      font-weight: 500;
      font-size: 16px;
      color: #07074d;
      outline: none;
      resize: none;
    }
    .formbold-form-input::placeholder {
      color: #536387;
    }
    .formbold-form-input:focus {
      border-color: #6a64f1;
      box-shadow: 0px 3px 8px rgba(0, 0, 0, 0.05);
    }
    .formbold-form-label {
      color: #07074d;
      font-size: 14px;
      line-height: 24px;
      display: block;
      margin-bottom: 10px;
    }
  
    .formbold-btn {
      text-align: center;
      width: 100%;
      font-size: 16px;
      border-radius: 5px;
      padding: 14px 25px;
      border: none;
      font-weight: 500;
      background-color: #6a64f1;
      color: white;
      cursor: pointer;
      margin-top: 25px;
    }
    .formbold-btn:hover {
      box-shadow: 0px 3px 8px rgba(0, 0, 0, 0.05);
    }

    body{
        background-color: cornflowerblue;
    }
    label{
        font-weight: bold;
        
    }

    h2{
      text-shadow: 0 0 2px blue;
      text-align: center;
      box-shadow: 0 0 2px blue;
    }
    p{
      text-align: center;
      font-weight: 600;
    }
  </style>
</head>
<body>

<div class="formbold-main-wrapper">
    <div class="formbold-form-wrapper" >
      <img src="./logo.png" width="60%" style="margin-left: 100px; margin-top : -30px;">
      <form action="" method="POST" name="workshop-form">
        <img src="./logo.png" class="watermark">
        <h2><i>Project Management and Scrum Bootcamp</i></h2>
        <p><i>30-Minute Free Seminar Registration Form<br>
          For Certified and Non-Certified Professionals
          </i></p>
          
        <div class="formbold-input-group">
          <label for="Name" class="formbold-form-label"> Full Name </label>
          <input
            type="text"
            name="name"
            id="Name"
            placeholder="Enter your Name"
            class="formbold-form-input"
            required
          />
        </div>
  
        <div class="formbold-input-group">
          <label for="Email" class="formbold-form-label"> Email Address</label>
          <input
            type="email"
            name="email"
            id="Email"
            placeholder="Enter your email"
            class="formbold-form-input"
            required
          />
        </div>
  
        <div class="formbold-input-group">
          <label for="Number" class="formbold-form-label"> Phone Number </label>
          <input
            type="text"
            name="number"
            id="Number"
            placeholder="Enter your Phone Number"
            class="formbold-form-input"
            required
          />
        </div>

        <div class="formbold-input-group">
          <label for="Number" class="formbold-form-label"> Company Name(If applicable) </label>
          <input
            type="text"
            name="company"
            id="Company"
            placeholder="Enter your Company Name"
            class="formbold-form-input"
          />
        </div>

        <div class="formbold-input-group">
          <label for="Number" class="formbold-form-label"> Job Title</label>
          <input
            type="text"
            name="job"
            id="Job"
            placeholder="Enter your Job Title"
            class="formbold-form-input"
          />
        </div>

        <h5>Certification Status</h5>
       <div class="formbold-input-radio-wrapper">
          <label for="certified" class="formbold-form-label">
            Are you a certified Project Management or Scrum Professional?
          </label>
  
          <div class="formbold-radio-flex">
            <div class="formbold-radio-group">
              <label class="formbold-radio-label">
                <input
                  class="formbold-input-radio"
                  type="radio"
                  id="Yes"
                  name="certified"
                  value="Yes"
                  required
                />
                Yes
                <span class="formbold-radio-checkmark"></span>
              </label>
            </div>
  
            <div class="formbold-radio-group">
              <label class="formbold-radio-label">
                <input
                  class="formbold-input-radio"
                  type="radio"
                  name="certified"
                  value="No"
                  id="No"
                  required
                />
                No
                <span class="formbold-radio-checkmark"></span>
              </label>
            </div>
          </div>
        </div> 

        <div class="formbold-input-group">
          <label for="certificate" class="formbold-form-label">If yes, please specify your certification(s):</label>
          <input
            type="text"
            name="certificate"
            id="Certificate"
            class="formbold-form-input"
          />
        </div>

        <h5>Seminar Details</h5>
        <div class="formbold-input-group">
          <label class="formbold-form-label">
            What is your primary goal for attending this seminar?
          </label>
  
          <select class="formbold-form-select" name="primarygoal" id="Experiance">
            <option value="disabled" selected>Please select</option>
            <option value="Enhance my current skills">Enhance my current skills</option>
            <option value="Gain certification preparation">Gain certification preparation</option>
            <option value="Learn about Scrum methodologies">Learn about Scrum methodologies</option>
            <option value="Explore project management practices">Explore project management practices</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <div class="formbold-input-radio-wrapper">
          <label for="working on a project" class="formbold-form-label">
              Are you currently working on a project or involved in Scrum teams?
          </label>
  
          <div class="formbold-radio-flex">
            <div class="formbold-radio-group">
              <label class="formbold-radio-label">
                <input
                  class="formbold-input-radio"
                  type="radio"
                  id="Yes"
                  name="workingproject"
                  value="Yes"
                  required
                />
                Yes
                <span class="formbold-radio-checkmark"></span>
              </label>
            </div>
  
            <div class="formbold-radio-group">
              <label class="formbold-radio-label">
                <input
                  class="formbold-input-radio"
                  type="radio"
                  name="workingproject"
                  value="No"
                  id="No"
                  required
                />
                No
                <span class="formbold-radio-checkmark"></span>
              </label>
            </div>
          </div>
        </div> 

        <div class="formbold-input-group">
          <label for="project" class="formbold-form-label">If yes, please briefly describe your role or project:</label>
          <input
            type="text"
            name="project"
            id="Project"
            class="formbold-form-input"
          />
        </div>

        <h5>Additional Information</h5>
        <div class="formbold-input-group">
          <label class="formbold-form-label">
            How did you hear about this seminar?
          </label>
  
          <select class="formbold-form-select" name="howyouhear" id="How did you hear" required>
            <option value="disabled" selected>Please select</option>
            <option value="Social Media">Social Media</option>
            <option value="Email">Email</option>
            <option value="Word of Mouth">Word of Mouth</option>
            <option value="Website">Website</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <div class="formbold-input-radio-wrapper">
          <label for="receiveupdates" class="formbold-form-label">
            Would you like to receive updates about future seminars, workshops, or training programs?
          </label>
  
          <div class="formbold-radio-flex">
            <div class="formbold-radio-group">
              <label class="formbold-radio-label">
                <input
                  class="formbold-input-radio"
                  type="radio"
                  id="Yes"
                  name="receiveupdates"
                  value="Yes"
                  required
                />
                Yes
                <span class="formbold-radio-checkmark"></span>
              </label>
            </div>
  
            <div class="formbold-radio-group">
              <label class="formbold-radio-label">
                <input
                  class="formbold-input-radio"
                  type="radio"
                  name="receiveupdates"
                  value="No"
                  id="No"
                  required
                />
                No
                <span class="formbold-radio-checkmark"></span>
              </label>
            </div>
          </div>
        </div> 

        <div class="formbold-input-group">
          <label for="topics" class="formbold-form-label">Any specific topics or questions you'd like us to address during the seminar?</label>
          <input
            type="text"
            name="topics"
            id="Topics"
            class="formbold-form-input"
          />
        </div>

        <h5>Consent and Confirmation</h5>
        <div class="formbold-input-radio-wrapper">
          <label for="working on a project" class="formbold-form-label">
            Consent to Attend:
          </label>
          <div class="formbold-radio-flex">
            <div class="formbold-radio-group">
              <label class="formbold-radio-label">
                <input
                  class="formbold-input-radio"
                  type="radio"
                  id="Yes"
                  name="iagree"
                  value="Yes"
                  required
                />
                I agree to attend the free seminar and understand the details outlined above.
                <span class="formbold-radio-checkmark"></span>
              </label>
            </div>
          </div>
        </div> 
  
        <input type="submit" value="Submit" id="submit"  name="submit" class="formbold-btn">
      </form>
    </div>
  </div>

   <script> 
      const scriptURL = 'https://script.google.com/macros/s/AKfycbwMFbplZXana4ZxtalywKF5bhLYKUI5jybpD18K6TIkuRqR05BvRT5jC3S-x6xLXl8v7A/exec'

      const form = document.forms['workshop-form']

      form.addEventListener('submit', e => {
            e.preventDefault();
            fetch(scriptURL, { method: 'POST', body: new FormData(form)})
                .then(response => {
                    if (response.ok) {
                        console.log('Form submission successful');
                        window.location.href = 'pmsubmission.html';
                    } else {
                        console.error('Form submission failed');
                    }
                })
                .catch(error => console.error('Error!', error.message));
        });
  </script>
  </body>

  </html>
