<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var a=28, b=35
   
        var Max = (a>b) ? a : b;
        document.write("<h1> Maximum Number is :"+ Max +"<br>") // 35

        var Min = (a<b) ? a : b;
        document.write(" Minimum Number is :"+ Min +"<br>") // 28
        
        var ans = (a==b) ? "Yes" : "No";
        document.write(" Answer is :"+ ans +"<br>") // No
        
    </script>
</body>
