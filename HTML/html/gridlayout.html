<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
.wrapper {
  display: grid;
  grid-template-columns: repeat(3, 1fr); /* 3 columns with 1fr size */
  gap: 10px;
  grid-auto-rows: minmax(100px, auto);
}
.one {
  grid-column: 1 / 3;
  grid-row: 1;
  border: 2px solid green ;
}
.two {
  grid-column: 2 / 4;
  grid-row: 1 / 3;
  border: 2px solid green ;
}
.three {
  grid-column: 1;
  grid-row: 2 / 5;
  border: 2px solid green ;
}
.four {
  grid-column: 3;
  grid-row: 3;
  border: 2px solid green ;
}
.five {
  grid-column: 2;
  grid-row: 4;
  border: 2px solid green ;
}
.six {
  grid-column: 3;
  grid-row: 4;
  border: 2px solid green ;
}
</style>
<body>
    <div class="wrapper">
        <div class="one">One</div>
        <div class="two">Two</div>
        <div class="three">Three</div>
        <div class="four">Four</div>
        <div class="five">Five</div>
        <div class="six">Six</div>
    </div>
</body>
</html>
