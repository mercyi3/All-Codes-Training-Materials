<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var number = 17; //5%2=0 == 0
        if(number % 2 == 0) // 5/2 = 3  remainder= 1
        {
            document.write("<h1>", number, " is an Even Number");
        }
        else {
            document.write("<h1>", number, " is an Odd Number");
        }
       
    </script>
</body>
</html>
