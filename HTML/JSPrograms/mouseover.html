<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>On Mouse Over</title>
</head>
<body>
    <h1 onmouseover="Demo()">Hello Everyone</h1>
    <h2 id="R" ></h2>
    <script>
        function Demo()  {
            document.getElementById("R").innerHTML="Welcome to Event Handling";
        }
    </script>
</body>
</html>
