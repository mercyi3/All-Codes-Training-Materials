<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            width: 300px;
            height: 300px;
            border: 5px solid red;
            margin: 50px 100px 20px 200px;
            padding: 50px ;
            box-sizing: border-box;
            box-shadow: 0 0 20px rgb(1, 1, 44);
        }
        h1{
            text-shadow: 2px 2px blue, 4px 4px green ;
        }
        h2{
            text-shadow: 0 0 5px red;
            color: red;
        }
    </style>
</head>
<body>
    <div>
        <h1>Margin &</h1>
        <h2>Padding</h2>
    </div>

    <p></p>
</body>
</html>
