<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onchange Event</title>
</head>
<body>
    <select id="R">
        <option value="1">Tae</option>
        <option value="2">Kookie</option>
        <option value="3">Jimin</option>
    </select>
    <script>
       function Demo(){
        alert("Value selected");
       }
       document.getElementById("R").onchange=Demo;
    </script>
</body>
</html>
