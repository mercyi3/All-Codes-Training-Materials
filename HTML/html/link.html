<html>
    <head>
        <style>
            a:link{
                background-color: rgb(49, 192, 5);
                color: #fff;
                padding: 14px 25px;
                text-align: center;
                text-decoration: none;
                display: inline-block;
                font-size: 25px;
            }
            a:visited {
                background-color: rgb(247, 231, 10);
            }
            a:hover {
                 background-color: red;
                 box-shadow: 0 0 5px red;
           }
            a:active{
                background-color: blueviolet;
            }
            
        </style>
    </head>
<body>
    <a href="https://www.blinkit.com">BlinkIt</a>
</body>
</html>
