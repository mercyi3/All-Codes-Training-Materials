<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .zoom{
        position: absolute;
        width: 100%;
        height: 100%;
        background-image: url('../Media/mage.webp');
        background-repeat: no-repeat;
        background-position: center;
        animation: zoomInOut 7s linear infinite;
    }
    @keyframes zoomInOut{
	0%,100%{
		transform: scale(1); /*original size */
	}
	50%{
		transform: scale(1.1); 
	}
}
</style>
<body>
    <div class="zoom">
    </div>
</body>
</html>
