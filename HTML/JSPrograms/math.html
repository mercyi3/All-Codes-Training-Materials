<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Square Root of 17 is: <span id="p1"></span> <br><br>
    Random Number is: <span id="p2"></span> <br><br>
    Random Number of 100 : <span id="p5"></span> <br><br>
    3 to the power of 4 is: <span id="p3"></span>  <br><br>
    Floor of 4.6 is: <span id="p4"></span> </h1>  
    <script>
        document.getElementById('p1').innerHTML=Math.sqrt(17) 
        document.getElementById('p3').innerHTML=Math.pow(3,4); 
        document.getElementById('p2').innerHTML=Math.random(); //0-1
        document.getElementById('p5').innerHTML=Math.floor(Math.random()*100); //0-100
        document.getElementById('p4').innerHTML=Math.floor(4.6);   //4
    </script>
</body>
</html>
