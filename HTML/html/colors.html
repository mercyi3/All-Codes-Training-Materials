<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
           height: 200px;
           width: 300px;
           background-color: blueviolet;
           text-align: center;
           margin: 120px 150px;
           padding: 30px;
           box-sizing: border-box;
           box-shadow: 5px 5px #343333;
        }
        h1{
            color: red;
            margin: 20px;
            text-shadow: 2px 2px green, 4px 4px blue;
        }
        h2{
            color: brown;
            margin: 20px 150px;
            padding: 20px;
            text-shadow: 0 0 2px brown;
            box-shadow: 0 0 20px #000;
        }
    </style>
</head>
<body>
    <h1>Text Shadow</h1>
    <h2>This is example of text shadow  effect</h2>
    <div>
        <h1>Box-Sizing</h1>
    </div>
</html>
