<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>
</head>
<style>
    .box{
        margin: 50px;
        width: 50%;
    }
    .coffee-box {
        height: 200px;
        width: 250px;
        background-color: aquamarine;
        float: inline-start;
    }
    .tea-box {
        height: 200px;
        width: 250px;
        background-color: rgb(127, 142, 255);
        float: inline-end;
    }
</style>
<body>
    <div class="box">
        <div class="coffee-box">
            <h1>Coffee</h1>
        </div>
        <div class="tea-box">
            <h1>Tea</h1>
        </div>
    </div>
</body>
</html>
