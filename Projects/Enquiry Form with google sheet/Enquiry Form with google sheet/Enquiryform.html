<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

  <title>Enquiry Form</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    .watermark {
      position: absolute;
      top: 100%;
      left: 50%;
      width: 40%;
      transform: translate(-50%, -50%);
      opacity: 0.1;
      pointer-events: none;
      z-index: 0;
    }
    body {
      font-family: 'Inter', sans-serif;
      background-image: url(./ClassRoom.jpg);
      background-repeat: no-repeat;
      background-size: cover;
      /* opacity: 0.9; */
    }
    .formbold-main-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px;
    }
  
    .formbold-form-wrapper {
      margin: 0 auto;
      max-width: 570px;
      width: 100%;
      background: white;
      padding: 40px;
      
    }
  
    .formbold-form-img {
      margin-bottom: 45px;
    }
  
    .formbold-input-group {
      margin-bottom: 18px;
    }
  
    .formbold-form-select {
      width: 100%;
      padding: 12px 22px;
      border-radius: 5px;
      border: 1px solid #dde3ec;
      background: #ffffff;
      font-size: 16px;
      color: #536387;
      outline: none;
      resize: none;
    }
  
    .formbold-input-radio-wrapper {
      margin-bottom: 25px;
    }
    .formbold-radio-flex {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .formbold-radio-label {
      font-size: 14px;
      line-height: 24px;
      color: #07074d;
      position: relative;
      padding-left: 25px;
      cursor: pointer;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }
    .formbold-input-radio {
      position: absolute;
      opacity: 0;
      cursor: pointer;
    }
    .formbold-radio-checkmark {
      position: absolute;
      top: -1px;
      left: 0;
      height: 18px;
      width: 18px;
      background-color: #ffffff;
      border: 1px solid #dde3ec;
      border-radius: 50%;
    }
    .formbold-radio-label
      .formbold-input-radio:checked
      ~ .formbold-radio-checkmark {
      background-color: #6a64f1;
    }
    .formbold-radio-checkmark:after {
      content: '';
      position: absolute;
      display: none;
    }
  
    .formbold-radio-label
      .formbold-input-radio:checked
      ~ .formbold-radio-checkmark:after {
      display: block;
    }
  
    .formbold-radio-label .formbold-radio-checkmark:after {
      top: 50%;
      left: 50%;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ffffff;
      transform: translate(-50%, -50%);
    }
  
    .formbold-form-input {
      width: 100%;
      padding: 13px 22px;
      border-radius: 5px;
      border: 1px solid #dde3ec;
      background: #ffffff;
      font-weight: 500;
      font-size: 16px;
      color: #07074d;
      outline: none;
      resize: none;
    }
    .formbold-form-input::placeholder {
      color: #536387;
    }
    .formbold-form-input:focus {
      border-color: #6a64f1;
      box-shadow: 0px 3px 8px rgba(0, 0, 0, 0.05);
    }
    .formbold-form-label {
      color: #07074d;
      font-size: 14px;
      line-height: 24px;
      display: block;
      margin-bottom: 10px;
    }
  
    .formbold-btn {
      text-align: center;
      width: 100%;
      font-size: 16px;
      border-radius: 5px;
      padding: 14px 25px;
      border: none;
      font-weight: 500;
      background-color: #6a64f1;
      color: white;
      cursor: pointer;
      margin-top: 25px;
    }
    .formbold-btn:hover {
      box-shadow: 0px 3px 8px rgba(0, 0, 0, 0.05);
    }

    body{
        background-color: cornflowerblue;
    }
    label{
        font-weight: bold;
        
    }
  </style>
</head>
<body>

<div class="formbold-main-wrapper">
    <div class="formbold-form-wrapper" >
      <img src="./logo.png" width="60%" style="margin-left: 100px; margin-top : -30px;">
      <form action="" method="POST" name="enquiry-form">
        <img src="./logo.png" class="watermark">
        <h2 style="text-align: center;">Enquiry Form</h2>
        <div class="formbold-input-group">
          <label for="Name" class="formbold-form-label"> Name </label>
          <input
            type="text"
            name="name"
            id="Name"
            placeholder="Enter your name"
            class="formbold-form-input"
            required
          />
        </div>
  
        <div class="formbold-input-group">
          <label for="Email" class="formbold-form-label"> Email </label>
          <input
            type="email"
            name="email"
            id="Email"
            placeholder="Enter your email"
            class="formbold-form-input"
            
          />
        </div>
  
        <div class="formbold-input-group">
          <label for="Number" class="formbold-form-label"> Phone Number </label>
          <input
            type="text"
            name="number"
            id="Number"
            placeholder="Enter your Phone Number"
            class="formbold-form-input"
            required
          />
        </div>

       <div class="formbold-input-radio-wrapper">
          <label for="gender" class="formbold-form-label">
            Gender
          </label>
  
          <div class="formbold-radio-flex">
            <div class="formbold-radio-group">
              <label class="formbold-radio-label">
                <input
                  class="formbold-input-radio"
                  type="radio"
                  id="Female"
                  name="gender"
                  value="Female"
                />
                Female
                <span class="formbold-radio-checkmark"></span>
              </label>
            </div>
  
            <div class="formbold-radio-group">
              <label class="formbold-radio-label">
                <input
                  class="formbold-input-radio"
                  type="radio"
                  name="gender"
                  value="Male"
                  id="Male"
                />
                Male
                <span class="formbold-radio-checkmark"></span>
              </label>
            </div>
  
            <div class="formbold-radio-group">
              <label class="formbold-radio-label">
                <input
                  class="formbold-input-radio"
                  type="radio"
                  name="gender"
                  value="Prefer not to say"
                  id="Other"
                />
                Prefer Not to Say
                <span class="formbold-radio-checkmark"></span>
              </label>
            </div>
          </div>
        </div> 

        <div class="formbold-input-group">
          <label for="qualification" class="formbold-form-label"> Qualification </label>
          <input
            type="text"
            name="qualification"
            id="Qualification"
            placeholder="Enter your Qualification"
            class="formbold-form-input"
          />
        </div>

        <div class="formbold-input-group">
          <label class="formbold-form-label">
            Work Experience
          </label>
  
          <select class="formbold-form-select" name="experience" id="Experiance">
            <option value=""disabled selected>Please select</option>
            <option value="Student">Student</option>
            <option value="Fresher">Fresher</option>
            <option value="Working Professional">Working Professional</option>
          </select>
        </div>
  
        <div class="formbold-input-group">
          <label class="formbold-form-label">
            Select the Course you want
          </label>
  
          <select class="formbold-form-select" name="course" id="Course" required>
            <option value=""disabled selected>Please select</option>
            <option value="hardware & Networking">Hardware & Networking</option>
            <option value="ccna">CCNA</option>
            <option value="ccnp">CCNP</option>
            <option value="linux">Linux</option>
            <option value="azure">Azure</option>
            <option value="azureDevops">Azure-DevOps</option>
            <option value="aws">AWS</option>
            <option value="awsDevops">AWS-DevOps</option>
            <option value="ccpp">C & C++</option>
            <option value="java">Java Full STack</option>
            <option value="other">Other</option>
          </select>
        </div>
  
        <div class="formbold-input-radio-wrapper">
          <label for="knows" class="formbold-form-label">
            How do you know about Innovative Academy?
          </label>
  
          <div class="formbold-radio-flex">
            <div class="formbold-radio-group">
              <label class="formbold-radio-label">
                <input
                  class="formbold-input-radio"
                  type="radio"
                  name="knows"
                  value="Google Search"
                  id="knows"
                />
                Google Search
                <span class="formbold-radio-checkmark"></span>
              </label>
            </div>
  
            <div class="formbold-radio-group">
              <label class="formbold-radio-label">
                <input
                  class="formbold-input-radio"
                  type="radio"
                  name="knows"
                  value="Social Media"
                  id="knows"
                />
                Social Media
                <span class="formbold-radio-checkmark"></span>
              </label>
            </div>

            <div class="formbold-radio-group">
              <label class="formbold-radio-label">
                <input
                  class="formbold-input-radio"
                  type="radio"
                  name="knows"
                  value="Referrel"
                  id="knows"
                />
                Referrel
                <span class="formbold-radio-checkmark"></span>
              </label>
            </div>
  
            <div class="formbold-radio-group">
              <label class="formbold-radio-label">
                <input
                  class="formbold-input-radio"
                  type="radio"
                  name="knows"
                  value="Other"
                  id="knows"
                />
                Outside Board & Other
                <span class="formbold-radio-checkmark"></span>
              </label>
            </div>
          </div>
        </div>

        <div class="formbold-input-radio-wrapper">
          <label for="classes" class="formbold-form-label">
            Which Class Mode you are looking for?
          </label>
  
          <div class="formbold-radio-flex">
            <div class="formbold-radio-group">
              <label class="formbold-radio-label">
                <input
                  class="formbold-input-radio"
                  type="radio"
                  name="classes"
                  value="Online"
                  id="class"
                />
                Online Class
                <span class="formbold-radio-checkmark"></span>
              </label>
            </div>
  
            <div class="formbold-radio-group">
              <label class="formbold-radio-label">
                <input
                  class="formbold-input-radio"
                  type="radio"
                  name="classes"
                  value="Offline"
                  id="ans"
                />
                Offline Class
                <span class="formbold-radio-checkmark"></span>
              </label>
            </div>
          </div>
        </div>
  
        <div>
          <label for="message" class="formbold-form-label">
            Any comments or suggestions
          </label>
          <textarea
            rows="6"
            name="message"
            id="message"
            placeholder="Type here..."
            class="formbold-form-input"
          ></textarea>
        </div>
  
        <input type="submit" value="Submit" id="submit"  name="submit" class="formbold-btn">
        <button type="reset" class="formbold-btn">Reset</button>
      </form>
    </div>
  </div>

   <script> 
      const scriptURL = 'https://script.google.com/macros/s/AKfycbwyNtBhmz0jl5Cnzn8pmHIAt-BNtiMhvfug7bAZ-mqhgGafeGu_rqOnlzzvfheRey3R7A/exec'

      const form = document.forms['enquiry-form']

      // form.addEventListener('submit', e => {
      //   e.preventDefault()
      //   fetch(scriptURL, { method: 'POST', body: new FormData(form)})
      //   .then(response => {
      //       window.location.href = 'Thankyou.html';
      //    })
      //   .then(() => { window.location.reload(); })
      //   .catch(error => console.error('Error!', error.message))
      // })

      form.addEventListener('submit', e => {
            e.preventDefault();
            fetch(scriptURL, { method: 'POST', body: new FormData(form)})
                .then(response => {
                    if (response.ok) {
                        console.log('Form submission successful');
                        window.location.href = 'Thankyou.html';
                    } else {
                        console.error('Form submission failed');
                    }
                })
                .catch(error => console.error('Error!', error.message));
        });
  </script>
  </body>

  </html>
