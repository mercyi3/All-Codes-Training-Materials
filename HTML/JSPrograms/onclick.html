<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onclick Event</title>
</head>
<body>
    <h1 id="rose"></h1>
	<button onclick="counting()">Submit</button> 
    <script>
        var count=0;
        function counting(){
        count=count+1; //count+=1;
        document.getElementById("rose").innerHTML=count;
        }
    </script>
</body>
</html>
