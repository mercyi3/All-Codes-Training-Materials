<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1 id="name"></h1>
    <script>
        let person = prompt("Please enter your name", "eg: Harry Potter");

        if (person != null) {
                document.getElementById("name").innerHTML =
                "Hello " + person + "! How are you today?";
        }   
    </script>

</body>
</html>
