    <title>Looping Example</title>
</head>
<body>
   
    <script>
        // factorial of a 3 = 3*2*1 = 6 
        var num =6, fact=1;
        for(var i=1; i<=7; i++)
        {
            fact *= i;
            document.writeln(i+"*")
        }
        document.writeln("Factorial : "+ fact)
    </script>
