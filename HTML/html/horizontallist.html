<!DOCTYPE html>
<html>
<head>
	<style>
	ul {
		list-style-type: none;
		overflow: hidden;
		background-color: #333333;
	   }
	li {
		float: left;
	   }
	li a {
  		display: block;
  		color: white;
        padding: 16px;
		text-decoration: none;
	}
	li a:hover {
		background-color: #17dab9;
		color:black;
	}
	</style>
</head>
<body>
	<ul>
	  <li><a href="#home">Home</a></li>
	  <li><a href="#news">News</a></li>
	  <li><a href="#contact">Contact</a></li>
  	  <li><a href="#about">About</a></li>
	</ul>
</body>
</html>
