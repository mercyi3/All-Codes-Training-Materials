<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>If else if Ladder Example</title>
</head>
<body>
    <script>
        //a number is positive or negative( 5(positive), -5(negative))
        // -3  -2  -1 < 0 < 1  2  3  4

        var n= -5;
        if(n > 0){ //-8>0
            document.write("<h1>", n, " is Posivite Number")
        }
        else if(n < 0) { //-8<0
            document.write("<h1>", n, " is Negative Number")
        }
        else {
            document.write("<h1>", n, " is Zero")
        }
    </script>
</body>
</html>
