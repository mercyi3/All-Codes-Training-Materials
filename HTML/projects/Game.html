<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Guesing game</title>
    <script src="./numberguessing.js" type="text/javascript"></script>
</head>
<style>
    :root{
        --purple : blueviolet;
    }
    .box{
        display: inline-block;
        margin: 50px 100px;
        padding: 30px;
        border: 2px ridge var(--purple);
    }
    h1 {
        color: var(--purple);
        text-shadow: 0 0 2px ;
        font-size: 30px;
    }
    .field {
        border: 2px solid var(--purple) ;
        height: 30px;
        text-align: center;
        border-radius: 10px;
    }

    .btn {
        border: 1px solid var(--purple);
        border-radius: 10px;
        font-size: 15px;
        font-weight: bold;
        padding: 10px;
        margin-left: 30px;
        color: var(--purple);
    }

    .btn:hover {
        color: #fff;
        background-color: var(--purple);
    }
    h2 {
        color: var(--purple);
        text-shadow: 0 0 2px ;
    }
</style>
<body>
    <div class="box">
        <h1>Guess the Number from 1 - 10: </h1>
        <input class="field" name="num" type="text" id="guess" placeholder="Enter a number" 
            onclick="empty()" required>
        <input class="btn" type="button" value="check" onclick="check()"> 
        <h2 id="answer"></h2>
    </div>
</body>
</html>
