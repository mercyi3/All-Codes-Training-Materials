<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex Layout</title>
    <style>
        .flex-container
        {
        display: flex;
        flex-direction: row;
        background-color: rgb(143, 200, 30);
        flex-wrap: wrap;
        height: 500px;
        align-items:center;  /*row wise*/
        justify-content:space-evenly; /*column wise*/
        }
        div{
            background-color: wheat;
            width: 100px;
            margin: 10px;
            line-height: 40px;
            font-size: 20px;
        }

    </style>
</head>
<body>
    <h1>CSS Flex Box Layout</h1>
    <!-- <span class="flex-container">
        <div class="div1">1</div>
        <div class="div2">2</div>
        <div class="div3">3</div>
        <div class="div4">4</div>
        <div class="div5">5</div>
        <div class="div6">6</div>
    </span> -->

    <span class="flex-container">
        <div style="order: 4;">1</div>
        <div style="order: 3;">2</div>
        <div style="flex-grow: 5;">3</div>
        <div style="order: 5;">4</div>
        <div style="order: 2; flex-grow: 1;">5</div>
    </span>
</body>
</html
