<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./demoo.css">
</head>
<style>
    .rgb{
        color: rgb(6, 151, 6);
    }
    .hex{
        color: #722da0;
    }
    .hsl{
        color: hsl(188, 80%,30%);
    }
    .hsla{
        color: hsl(188, 80%,30%, 0.7);
    }
    .rgba{
        color: rgba(255, 0, 0, 0.787);
    }
</style>
<body>
    <h1 class="rgb">Hello World</h1>
    <h1 class="hex">Hello World</h1>
    <h1 class="hsl">Hello World</h1>
    <h1 class="hsla">Hello World</h1>
    <h1 class="rgba">Hello World</h1>

</body>
</html>
